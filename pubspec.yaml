name: sleep
description: "Dream Drift Sleep — A premium dedicated sleep application"
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.3.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17

  # State Management
  provider: ^6.1.2

  # Audio
  just_audio: ^0.9.43
  just_audio_background: ^0.0.1-beta.14
  audio_service: ^0.18.17
  audio_session: ^0.1.25

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  google_sign_in: ^6.2.2

  # Local Storage
  shared_preferences: ^2.3.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Charts
  fl_chart: ^0.70.2

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Splash
  flutter_native_splash: ^2.4.5

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  share_plus: ^12.0.1
  timezone: ^0.10.1
  flutter_timezone: ^5.0.2
  speech_to_text: ^7.3.0
  permission_handler: ^12.0.1
  health: ^13.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/audio/
    - assets/audio/music_sounds/
    - assets/audio/Stories/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Light.ttf
          weight: 300
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#0A0E27"
  image: assets/images/app_logo.png
  android: true
  ios: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21 # android min sdk min:16, default:21
